name: tests

on:
  push:
  pull_request:

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax
        run: |
          bash -n bin/z9-nef-to-fits
          bash -n bin/z9-nef-to-fits-one
          bash -n bin/z9-nef-to-fits-worker
          bash -n tests/smoke-test.sh
          bash -n tests/test-cli.sh
      - name: CLI tests
        run: tests/test-cli.sh
